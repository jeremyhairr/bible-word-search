<!doctype html>
<html>
  <head>
    <title>Disciple's Source</title>
    <!-- iPhone Home Screen Icon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/static/goose_quill.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/static/goose_quill.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="120x120"
      href="/static/goose_quill.png"
    />

    <!-- Browser Tab Icon (Favicon) -->
    <link rel="icon" type="image/png" href="/static/icon.png" />

    <!-- Optional: Make it feel like an app on iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Disciple's Source" />
    <style>
      h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 32px;
      }
      .section-card {
        background: #e8e5e5;
        padding: 20px;
        margin-bottom: 40px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }

      .section-card h2 {
        margin-bottom: 15px;
      }
      .commentary-toggle {
        margin: 15px 0;
      }

      .commentary-toggle h2 {
        margin-bottom: 10px;
      }

      .commentary-toggle label {
        display: inline-flex;
        align-items: center;
      }

      .commentary-toggle input[type="checkbox"] {
        transform: scale(1.6);
        margin-right: 6px;
      }
      .font-btn {
        width: auto;
        padding: 5px 10px;
        margin-left: 5px;
      }
      .bible-text p {
        line-height: 1.6;
        font-size: 16px; /* base size */
      }
      body {
        font-family: Arial;
        padding: 30px;
        max-width: 800px;
        margin: auto;
      }

      input,
      select,
      button {
        padding: 10px;
        margin: 5px 0;
        width: 100%;
      }

      button {
        background: #333;
        color: white;
        border: none;
        cursor: pointer;
      }

      button:hover {
        background: #555;
      }

      .section {
        margin-top: 30px;
      }
    </style>
  </head>

  <body>
    <h1>📖 Disciple's Source</h1>

    <div style="text-align: right; margin-bottom: 10px">
      <button class="font-btn" onclick="changeFontSize(-1)">A-</button>
      <button class="font-btn" onclick="changeFontSize(1)">A+</button>
    </div>

    <!-- READ -->
    <div class="section-card">
      <h2>Read Passage</h2>

      <select id="versionSelect">
        <option value="esv">ESV</option>
        <option value="csb">CSB</option>
      </select>

      <input id="readBox" placeholder="John 3 or Psalm 23" />

      <button onclick="readPassage()">Read Passage</button>
      <div class="section-card">
        <h2>Show Commentary</h2>

        <label>
          <input type="checkbox" id="henryToggle" checked />
          Henry
        </label>

        <label>
          <input type="checkbox" id="calvinToggle" checked />
          Calvin
        </label>
      </div>
      <div id="reading"></div>
    </div>

    <!-- SEARCH -->
    <div class="section-card">
      <h2>Search</h2>

      <input id="searchBox" placeholder="Search word..." />

      <button onclick="startSearch()">Search</button>

      <div id="results"></div>
    </div>

    <!--THEOLOGY-->

    <div class="section-card">
      <h2>Theology</h2>

      <input
        id="theologyBox"
        placeholder="Search Institutes, Berkhof, etc..."
      />

      <button onclick="searchTheology()">Search</button>

      <div id="theologyResults"></div>
    </div>

    <!-- ASK -->
    <div class="section-card">
      <h2>Ask (AI)</h2>

      <input id="askBox" placeholder="Ask a question..." />

      <button onclick="askQuestion()">Ask</button>

      <div id="askResult"></div>
    </div>

    <!-- ONLY SCRIPT -->
    <script src="/static/script.js"></script>
  </body>
</html>

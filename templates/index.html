<!DOCTYPE html>
<html>
<head>
    <title>Bible App</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .tabs {
            display: flex;
            margin-bottom: 15px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            cursor: pointer;
            background: #ddd;
        }

        .active {
            background: #333;
            color: white;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
            background: #333;
            color: white;
            border: none;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            background: white;
            border-radius: 5px;
        }

        mark {
            background: yellow;
            font-weight: bold;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .hidden {
            display: none;
        }

        .reading {
            background: white;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            line-height: 1.6;
        }

        .footer {
            font-size: 12px;
            color: gray;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📖 Bible App</h1>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="showTab('read')">Read</button>
        <button class="tab" onclick="showTab('search')">Search</button>
    </div>

    <!-- READ SECTION -->
    <div id="readSection">
        <input id="readBox" placeholder="John 3, Psalm 23..." />
        <button onclick="readPassage()">Read Passage</button>

        <div id="reading" class="reading"></div>
    </div>

    <!-- SEARCH SECTION -->
    <div id="searchSection" class="hidden">
        <input id="searchBox" placeholder="Search word..." />
        <button onclick="startSearch()">Search</button>

        <p id="summary"></p>

        <div id="results"></div>

        <div class="nav">
            <button onclick="prevPage()">⬅</button>
            <span id="pageInfo"></span>
            <button onclick="nextPage()">➡</button>
        </div>
    </div>

    <div class="footer">
        Scripture quotations are from the ESV® Bible (The Holy Bible, English Standard Version®),
        copyright © 2001 by Crossway.
    </div>

</div>

<script>
    let currentPage = 1;
    let currentQuery = "";
    let totalPages = 1;

    // 🔁 Tabs
    function showTab(tab) {
        document.getElementById("readSection").classList.add("hidden");
        document.getElementById("searchSection").classList.add("hidden");

        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

        if (tab === "read") {
            document.getElementById("readSection").classList.remove("hidden");
            document.querySelectorAll(".tab")[0].classList.add("active");
        } else {
            document.getElementById("searchSection").classList.remove("hidden");
            document.querySelectorAll(".tab")[1].classList.add("active");
        }
    }

    // 📖 READ
    async function readPassage() {
        const ref = document.getElementById("readBox").value;

        const res = await fetch(`/read?reference=${encodeURIComponent(ref)}`);
        const data = await res.json();

        const readingDiv = document.getElementById("reading");

        if (data.error) {
            readingDiv.innerHTML = data.error;
            return;
        }

        readingDiv.innerHTML = `<h3>${data.reference}</h3><p>${data.text}</p>`;
    }

    // 🔍 SEARCH
    function highlight(text, word) {
        const regex = new RegExp(`(${word})`, "gi");
        return text.replace(regex, "<mark>$1</mark>");
    }

    function startSearch() {
        currentQuery = document.getElementById("searchBox").value;
        currentPage = 1;
        loadPage();
    }

    async function loadPage() {
        const res = await fetch(`/search?query=${encodeURIComponent(currentQuery)}&page=${currentPage}`);
        const data = await res.json();

        const resultsDiv = document.getElementById("results");
        const summary = document.getElementById("summary");
        const pageInfo = document.getElementById("pageInfo");

        resultsDiv.innerHTML = "";

        if (data.error) {
            summary.textContent = data.error;
            return;
        }

        totalPages = data.total_pages;

        summary.textContent = `Found ${data.total_results} results`;

        pageInfo.textContent = `Page ${data.page}/${totalPages}`;

        data.results.forEach(r => {
            const div = document.createElement("div");
            div.className = "result";

            const highlighted = highlight(r.content, currentQuery);

            div.innerHTML = `<strong>${r.reference}</strong><br>${highlighted}`;
            resultsDiv.appendChild(div);
        });
    }

    function nextPage() {
        if (currentPage < totalPages) {
            currentPage++;
            loadPage();
        }
    }

    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            loadPage();
        }
    }

    // ⌨️ ENTER SUPPORT
    document.getElementById("searchBox").addEventListener("keypress", function(e) {
        if (e.key === "Enter") startSearch();
    });

    document.getElementById("readBox").addEventListener("keypress", function(e) {
        if (e.key === "Enter") readPassage();
    });
</script>

</body>
</html>
